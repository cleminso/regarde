Unified Nginx Configuration for api.regarde.bio and auth.regarde.dev

This configuration handles both services on the same VM

- api.regarde.bio -> localhost:4000

- auth.regarde.dev -> localhost:3000

HTTP to HTTPS redirect for all domains

server {listen 80;server_name api.regarde.bio auth.regarde.dev;

# Redirect HTTP to HTTPS
return 301 https://$server_name$request_uri;

}

api.regarde.bio - Internal profile-app logic

server {listen 443 ssl http2;server_name api.regarde.bio;

# SSL Configuration - managed by Certbot
ssl_certificate /etc/letsencrypt/live/api.regarde.bio/fullchain.pem;
ssl_certificate_key /etc/letsencrypt/live/api.regarde.bio/privkey.pem;
include /etc/letsencrypt/options-ssl-nginx.conf;
ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

# Security Headers
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Frame-Options DENY always;
add_header X-Content-Type-Options nosniff always;
add_header X-XSS-Protection "1; mode=block" always;

# Client body size limit
client_max_body_size 10M;

# Proxy settings for api.regarde.bio service (port 4000)
location / {
    proxy_pass http://127.0.0.1:4000;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Port $server_port;
    proxy_cache_bypass $http_upgrade;
    proxy_read_timeout 86400;
}

}

