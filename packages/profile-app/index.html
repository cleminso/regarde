<!doctype html>
<html lang="en" class="h-full">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />

    <!-- Default title and description (will be updated by React) -->
    <title>Profile - Jazz.dev</title>
    <meta
      name="description"
      content="Discover and connect with profiles on regarde.dev - a platform for personal and professional networking."
    />

    <!-- OpenGraph fallback meta tags -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Jazz.dev" />
    <meta property="og:title" content="Profile - Jazz.dev" />
    <meta
      property="og:description"
      content="Discover and connect with profiles on regarde.dev - a platform for personal and professional networking."
    />
    <meta property="og:url" content="https://regarde.dev" />
    <meta
      property="og:image"
      content="https://regarde.dev/og-default.png"
    />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="regarde.dev - The only online profile you will ever need"
    />
    <meta property="og:image:type" content="image/png" />

    <!-- Twitter Card fallback meta tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@jazzdotdev_" />
    <meta name="twitter:title" content="Profile - Jazz.dev" />
    <meta
      name="twitter:description"
      content="Discover and connect with profiles on regarde.dev - a platform for personal and professional networking."
    />
    <meta
      name="twitter:image"
      content="https://regarde.dev/og-default.png"
    />
    <meta
      name="twitter:image:alt"
      content="regarde.dev - Online Profile Platform"
    />

    <!-- Additional SEO meta tags -->
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://regarde.dev" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,700;1,400;1,700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="h-full flex flex-col">
    <div id="root" class="align-self-center flex-1"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
